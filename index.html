<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Card New name</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>
  <div class="card">
    <div class="card-background"></div>
    <img src="item-image.png" alt="Product" class="item-img">
    <h1 class="item-title">DROID BB08</h1>
    <p class="item-description">This is a sample description</p>
    <button class="item-button">
      <span class="button-text">ADD TO CART</span>
    </button>
  </div>
  <script src="script.js"></script>
</body>
</html>
